name: 'Buddy Publish Artifact'
description: 'Publish artifacts to Buddy CI/CD platform'
author: 'Marcel Gańczarczyk'
runs:
  using: 'node24'
  main: 'dist/index.js'
inputs:
  workspace:
    description: 'Buddy workspace domain'
    required: true
  project:
    description: 'Buddy project name (URL handle)'
    required: true
  identifier:
    description: 'Artifact identifier with optional version (e.g., my-artifact or my-artifact@1.0.0)'
    required: true
  directory:
    description: 'Path to the directory or file to publish'
    required: true
  create:
    description: 'Create artifact if it does not exist'
    required: false
  force:
    description: 'Allow overwriting existing version'
    required: false
outputs:
  artifact_url:
    description: 'The URL of the published artifact'
branding:
  icon: 'package'
  color: 'blue'
